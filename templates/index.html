<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeDupe — CSV Duplicate Remover</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #242430;
      --accent: #00ffb2;
      --accent2: #ff3cac;
      --text: #e8e8f0;
      --muted: #666680;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,178,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,178,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 56px;
    }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    h1 span {
      color: var(--accent);
      position: relative;
    }

    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      opacity: 0.4;
    }

    .subtitle {
      margin-top: 16px;
      color: var(--muted);
      font-size: 1rem;
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed var(--border);
      background: var(--surface);
      padding: 56px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,255,178,0.04) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: #13131a;
    }

    .upload-zone:hover::before, .upload-zone.drag-over::before {
      opacity: 1;
    }

    .upload-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      color: var(--accent);
    }

    .upload-zone h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .upload-zone p {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.85rem;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #000;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      padding: 14px 32px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      text-transform: uppercase;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,255,178,0.25);
    }

    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .btn-outline:hover {
      background: var(--accent);
      color: #000;
    }

    /* File selected indicator */
    #file-indicator {
      display: none;
      margin-top: 16px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
      background: rgba(0,255,178,0.07);
      border: 1px solid rgba(0,255,178,0.2);
      padding: 10px 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    /* Actions row */
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Progress / spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats Cards */
    .stats {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card:nth-child(1)::after { background: var(--accent); }
    .stat-card:nth-child(2)::after { background: var(--accent2); }
    .stat-card:nth-child(3)::after { background: #7c6fff; }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .stat-card:nth-child(1) .stat-value { color: var(--accent); }
    .stat-card:nth-child(2) .stat-value { color: var(--accent2); }
    .stat-card:nth-child(3) .stat-value { color: #7c6fff; }

    /* Results section */
    #results {
      display: none;
      margin-top: 40px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.8rem;
    }

    thead tr {
      background: #1a1a24;
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.72rem;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(36,36,48,0.6);
      transition: background 0.1s;
    }

    tbody tr:hover { background: rgba(0,255,178,0.04); }

    td {
      padding: 10px 16px;
      color: var(--text);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }

    /* Row number column */
    td:first-child, th:first-child {
      color: var(--muted);
      font-size: 0.7rem;
      width: 40px;
    }

    /* Error */
    .error-box {
      display: none;
      margin-top: 24px;
      background: rgba(255,60,172,0.08);
      border: 1px solid rgba(255,60,172,0.3);
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent2);
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    /* Footer */
    footer {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 80px;
      padding-bottom: 40px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      h1 { font-size: 2.5rem; }
    }

    /* Fade-in animation */
    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge">CSV Tool v1.0</div>
      <h1>De<span>Dupe</span></h1>
      <p class="subtitle">// upload → clean → download. no noise.</p>
    </header>

    <!-- Upload Zone -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept=".csv" />
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M8 10l4-4 4 4M12 6v10" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h2>Drop your CSV here</h2>
      <p>or click anywhere to browse files</p>
    </div>

    <div id="file-indicator" style="display:none; margin-top:16px; font-family:var(--mono); font-size:0.85rem; color:var(--accent); background:rgba(0,255,178,0.07); border:1px solid rgba(0,255,178,0.2); padding:10px 16px; align-items:center; gap:8px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"/></svg>
      <span id="file-name">—</span>
    </div>

    <div class="actions">
      <button class="btn" id="process-btn" disabled onclick="processFile()">
        <span>Remove Duplicates</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button class="btn btn-outline" id="reset-btn" onclick="resetAll()" style="display:none;">
        Reset
      </button>
    </div>

    <div class="error-box" id="error-box"></div>

    <!-- Stats -->
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">Original Rows</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Duplicates Removed</div>
        <div class="stat-value" id="stat-dupes">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Clean Rows</div>
        <div class="stat-value" id="stat-clean">—</div>
      </div>
    </div>

    <!-- Results -->
    <div id="results">
      <hr class="divider"/>
      <div class="section-header">
        <span class="section-title">Preview — first 10 rows</span>
        <button class="btn" id="download-btn" onclick="downloadFile()">
          ↓ Download CSV
        </button>
      </div>
      <div class="table-wrapper">
        <table id="preview-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <footer>Built with Flask + Pandas &nbsp;·&nbsp; DeDupe © 2025</footer>
  </div>

  <script>
    let downloadFilename = null;

    const fileInput = document.getElementById('file-input');
    const uploadZone = document.getElementById('upload-zone');
    const processBtn = document.getElementById('process-btn');
    const resetBtn = document.getElementById('reset-btn');
    const fileIndicator = document.getElementById('file-indicator');
    const fileNameSpan = document.getElementById('file-name');
    const spinner = document.getElementById('spinner');

    // File input change
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        showFileSelected(fileInput.files[0].name);
      }
    });

    // Drag & drop
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });

    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0 && files[0].name.endsWith('.csv')) {
        fileInput.files = files;
        showFileSelected(files[0].name);
      } else {
        showError('Please drop a valid .csv file.');
      }
    });

    function showFileSelected(name) {
      fileIndicator.style.display = 'flex';
      fileNameSpan.textContent = name;
      processBtn.disabled = false;
      hideError();
      document.getElementById('stats').style.display = 'none';
      document.getElementById('results').style.display = 'none';
      resetBtn.style.display = 'none';
    }

    async function processFile() {
      if (!fileInput.files.length) return;

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      // Loading state
      processBtn.disabled = true;
      spinner.style.display = 'block';
      processBtn.querySelector('span').textContent = 'Processing...';
      hideError();

      try {
        const resp = await fetch('/process', { method: 'POST', body: formData });
        const data = await resp.json();

        spinner.style.display = 'none';
        processBtn.querySelector('span').textContent = 'Remove Duplicates';

        if (data.error) {
          showError(data.error);
          processBtn.disabled = false;
          return;
        }

        // Show stats
        document.getElementById('stat-total').textContent = data.total_rows.toLocaleString();
        document.getElementById('stat-dupes').textContent = data.duplicates_removed.toLocaleString();
        document.getElementById('stat-clean').textContent = data.cleaned_rows.toLocaleString();

        const statsEl = document.getElementById('stats');
        statsEl.style.display = 'grid';
        statsEl.classList.add('fade-in');

        // Build table
        buildTable(data.columns, data.preview);

        const resultsEl = document.getElementById('results');
        resultsEl.style.display = 'block';
        resultsEl.classList.add('fade-in');

        downloadFilename = data.download_file;
        resetBtn.style.display = 'inline-flex';

      } catch (err) {
        spinner.style.display = 'none';
        processBtn.querySelector('span').textContent = 'Remove Duplicates';
        processBtn.disabled = false;
        showError('Network error — is the server running?');
      }
    }

    function buildTable(columns, rows) {
      const thead = document.getElementById('table-head');
      const tbody = document.getElementById('table-body');

      // Header
      const headerRow = document.createElement('tr');
      headerRow.innerHTML = '<th>#</th>' + columns.map(c => `<th>${c}</th>`).join('');
      thead.innerHTML = '';
      thead.appendChild(headerRow);

      // Body
      tbody.innerHTML = '';
      rows.forEach((row, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i + 1}</td>` + columns.map(c => `<td title="${row[c] ?? ''}">${row[c] ?? ''}</td>`).join('');
        tbody.appendChild(tr);
      });
    }

    function downloadFile() {
      if (downloadFilename) {
        window.location.href = `/download/${downloadFilename}`;
      }
    }

    function resetAll() {
      fileInput.value = '';
      fileIndicator.style.display = 'none';
      processBtn.disabled = true;
      processBtn.querySelector('span').textContent = 'Remove Duplicates';
      resetBtn.style.display = 'none';
      document.getElementById('stats').style.display = 'none';
      document.getElementById('results').style.display = 'none';
      hideError();
      downloadFilename = null;
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = '⚠ ' + msg;
      box.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-box').style.display = 'none';
    }
  </script>
</body>
</html>
